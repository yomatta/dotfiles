# Browser Types
windowrule = tag +firefox-based-browser, class:([fF]irefox|librewolf)
windowrule = tag +chromium-based-browser, class:((google-)?[C]hrom(e|ium)|[bB]rave-browser|Microsoft-edge|Vivaldi-stable|helium)

# Force chromium-based browsers into a title to deal with --app bug
windowrule = tile, tag:chromium-based-browser

# Only a subtle opacity change, but not for video sites
windowrule = opacity 1 0.97, tag:chromium-based-browser
windowrule = opacity 1 0.97, tag:firefox-based-browser
#windowrule = opacity 1 override 1 override, tag:firefox-based-browser

# Some video sites should never have opacity applied to them
windowrule = opacity 1.0 override 1.0 override, initialTitle:(?i)(?:[a-z0-9]+\.)*youtube\.com_/|app\.zoom\.us_/wc/home)
