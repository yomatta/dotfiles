
###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Application Bindings (Omarchy)
# $browser = omarchy-launch-browser
# bind = $mainMod, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
# bind = $mainMod, M, Music, exec, omarchy-launch-or-focus spotify
# bind = $mainMod, T, Activity, exec, $terminal -e btop
# bind = $mainMod, N, Editor, exec, omarchy-launch-editor

$terminal = uwsm app -- alacritty
$browser = uwsm app -- firefox
#$menu = wofi -i --show drun --allow-images -D key_expand=Tab
$menu = wofi -n

# Path of Exile Logout Macro
bind = , GRAVE, exec, sudo ss -K dport 6112

bind = $mainMod, return, exec, $terminal
bind = $mainMod SHIFT, return, exec, uwsm app -- kitty
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, N, exec, uwsm app -- kate -n
bind = $mainMod, F, exec, uwsm app -- dolphin --new-window

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, W, killactive,
bind = $mainMod, ESCAPE, exec, hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, S, togglesplit, # dwindle

#ELIF Theme
bind = $mainMod, Q, exec, ~/.config/hypr/wallpaper.sh

# Screenshots
bind = , Print, exec, hyprshot -m active -m output -o ~/Pictures/screenshots #screen
bind = CTRL, Print, exec, hyprshot -m region -o ~/Pictures/screenshots #region
bind = ALT, Print, exec, hyprshot -m window -o ~/Pictures/screenshots #window

# PYPR
bind = $mainMod, T, exec, pypr toggle taskbar
bind = $mainMod CTRL, SPACE, exec, pypr toggle music
bind = $mainMod ALT, return, exec, pypr toggle term

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, H, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, L, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, K, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Swap active window with the one next to it with mainMod + SHIFT + arrow keys
bindd = $mainMod SHIFT, left, Swap window to the left, swapwindow, l
bindd = $mainMod SHIFT, H, Swap window to the left, swapwindow, l
bindd = $mainMod SHIFT, right, Swap window to the right, swapwindow, r
bindd = $mainMod SHIFT, L, Swap window to the right, swapwindow, r
bindd = $mainMod SHIFT, up, Swap window up, swapwindow, u
bindd = $mainMod SHIFT, K, Swap window up, swapwindow, u
bindd = $mainMod SHIFT, down, Swap window down, swapwindow, d
bindd = $mainMod SHIFT, J, Swap window down, swapwindow, d

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

