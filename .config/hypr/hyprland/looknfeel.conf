# How much of this should come from the theme files?


#####################
### LOOK AND FEEL ###
#####################

source = /home/$USER/.cache/wal/colors-hyprland

# https://wiki.hypr.land/Configuring/Variables/#general
general {

    gaps_in = 3
    gaps_out = 7
    border_size = 2

    col.active_border = $color9
    col.inactive_border = $color5
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
	
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {

    rounding = 3
    active_opacity = 0.8 # 0.78
    inactive_opacity = 0.7 # 0.7
    fullscreen_opacity = 1

    blur {
        enabled = true
        size = 5
        passes = 5
        new_optimizations = true
        ignore_opacity = true
        xray = true
        popups = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 5
        color = rgba(0,0,0,.5)
    }
}

animations {

    enabled = true
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 3, fluid, popin 5%
    animation = windowsOut, 1, 2.5, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 1.7, snappy, slide
    animation = specialWorkspace, 1, 4, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%

}

# Opacity overrides for a few things
windowrule = opacity 1 override 1, initialClass:kitty-pulsemixer
windowrule = opacity 1 override 1, initialClass:kitty-dropterm

#####################
###    LAYOUT     ###
#####################

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    force_split = 2 # Always split on the right
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    focus_on_activate = true
}


layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = ignorealpha 0.5, waybar
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window
layerrule = noanim, selection



