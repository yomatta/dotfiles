# Desktop Monitors

monitorrule=name:DP-3,width:3440,height:1440,refresh:143.975006,x:0,y:0
monitorrule=name:DP-1,width:2560,height:1440,refresh:165,x:3440,y:0

# keyboard
repeat_rate=35
repeat_delay=400
numlockon=1
xkb_rules_layout=us

# mouse
# need relogin to make it apply
cursor_size=24
env=XCURSOR_SIZE,24
mouse_natural_scrolling=0
warpcursor=1
sloppyfocus=0

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

