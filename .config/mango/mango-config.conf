# More option see https://github.com/DreamMaoMao/mango/wiki/

source=~/.config/mango/mango-config-bindings.conf
source=~/.config/mango/mango-config-colors.conf
source=~/.config/mango/mango-config-io.conf
source=~/.config/mango/mango-config-layout.conf
source=~/.config/mango/mango-config-looknfeel.conf
#source=~/.config/mango/mango-monitors-desktop.conf

# Autostart Script (only executes on launch, not config reload)
exec-once=~/.config/mango/mango-autostart.sh

# Waybar
exec=yomatta-waybar-launcher >/dev/null 2>&1 &

#exec=swaybg -i ~/.config/_themes/_current/background -m fill >/dev/null 2>&1 &
exec=swaybg -i ~/walls/cp77-5.jpg -m fill >/dev/null 2>&1 &

#setting float mode
source = ~/.config/mango/mango-float.conf

# mango theme import
source-optional=~/.config/themes/_current/mango-theme.conf

# Environment Variables
env=QT_QPA_PLATFORMTHEME=qt6ct

# Overrides
# (any settings below this point will override corresponding settings from above)
